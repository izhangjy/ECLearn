name: eclearn
description: 高考英语和语文学习辅助App，基于刻意练习法
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 数据库
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # 网络请求
  dio: ^5.4.0

  # UI组件
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0

  # 工具
  intl: 0.20.2
  uuid: ^4.2.2
  collection: ^1.18.0
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  shared_preferences: ^2.2.2

  # 图片处理
  image_picker: ^1.0.5

  # 图表
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  drift_dev: ^2.14.1
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
